apiVersion: apps/v1
kind: Deployment
metadata:
  name: investmentology-controller
  namespace: investmentology
  labels:
    app.kubernetes.io/name: investmentology-controller
    app.kubernetes.io/component: pipeline-controller
spec:
  replicas: 1
  strategy:
    type: Recreate  # Only one controller instance at a time
  selector:
    matchLabels:
      app.kubernetes.io/name: investmentology-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: investmentology-controller
        app.kubernetes.io/component: pipeline-controller
    spec:
      containers:
        - name: controller
          image: ghcr.io/charlieshreck/investmentology-api:latest
          command: ["investmentology", "controller"]
          envFrom:
            - secretRef:
                name: investmentology-secrets
          env:
            - name: HB_PROXY_URL
              value: "http://10.10.0.101:9100"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
